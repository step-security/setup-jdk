name: 'nightly'
on:
  push:
    branches:
      - main
jobs:
  run:
    name: Run
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: ${{ github.actor == 'dependabot[bot]' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macOS-latest", "windows-latest"]') }}
        java-version: ${{ github.actor == 'dependabot[bot]' && fromJSON('[8]') || fromJSON('[8, 11, 16]') }}
        architecture: ${{ github.actor == 'dependabot[bot]' && fromJSON('["x64"]') || fromJSON('["x64", "x32"]') }}
        exclude:
        - operating-system: ubuntu-latest
          architecture: 'x32'
        - operating-system: macOS-latest
          architecture: 'x32'
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set Node.js 24.x
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24.x
    - name: npm install
      run: npm install
    - name: Clear tool cache
      if: runner.os != 'windows'
      run: mv "${{ runner.tool_cache }}" "${{ runner.tool_cache }}.old"
    - name: Clear tool cache (Windows)
      if: runner.os == 'windows'
      run: move "${{ runner.tool_cache }}" "${{ runner.tool_cache }}.old"
    - name: Setup Java ${{ matrix.java-version}}
      id: setup-java
      uses: ./
      with:
        java-version: ${{ matrix.java-version }}
        architecture: ${{ matrix.architecture }}
    - name: Verify Java ${{ matrix.java-version}}
      if: runner.os != 'windows'
      run: __tests__/verify-java.sh "${{ matrix.java-version }}" "${{ steps.setup-java.outputs.path }}" "${{ steps.setup-java.outputs.version }}"
    - name: Verify Java ${{ matrix.java-version}} (Windows)
      if: runner.os == 'windows'
      run: __tests__/verify-java.ps1 "${{ matrix.java-version }}" "${{ steps.setup-java.outputs.path }}" "${{ steps.setup-java.outputs.version }}"
